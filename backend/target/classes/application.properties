# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# Base URL used to build absolute file URLs (must match your backend host)
app.base-url=http://localhost:8080

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/tutorfinder?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=VGVzdFNlY3JldEtleUZvclR1dG9yRmluZGVyMjAyNEFwcA==
jwt.expiration=86400000

# ── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# ── Razorpay ─────────────────────────────────────────────────────────────────
razorpay.key.id=rzp_test_XXXXXXXXXXXXXXXX
razorpay.key.secret=YOUR_RAZORPAY_SECRET
razorpay.currency=INR
razorpay.webhook.secret=YOUR_WEBHOOK_SECRET

# ── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:4200

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.tutorfinder=DEBUG
